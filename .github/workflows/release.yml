# yamllint disable rule:line-length rule:truthy
---
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq rpm
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - name: Install Cargo Deb
        run: cargo install cargo-deb
      - name: Install Cargo Rpm
        run: cargo install cargo-rpm

      - name: Build Debian Package
        run: cargo deb
      - name: Build Rpm Package
        run: cargo rpm build
      - name: Build Static Linux Binary
        run: cargo build --target x86_64-unknown-linux-musl --release --features app

      - name: Gather Debian Package Filename
        id: deb_pkg_filename
        run: |
          DEB_PKG_VERSION=$(cargo read-manifest | jq -r .version | sed 's/-/~/')
          echo "filename=mhost_${DEB_PKG_VERSION}_amd64.deb" >> "$GITHUB_OUTPUT"
      - name: Gather Rpm Package Filename
        id: rpm_pkg_filename
        run: |
          RPM_PKG_FILENAME=$(ls -1 ./target/release/rpmbuild/RPMS/x86_64/ | head -1)
          echo "filename=${RPM_PKG_FILENAME}" >> "$GITHUB_OUTPUT"
      - name: Gather Docker Tag
        id: docker_info
        run: |
          DOCKER_TAG=$(echo "${{ github.ref }}" | sed 's|^refs/tags/||')
          echo "tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./target/debian/${{ steps.deb_pkg_filename.outputs.filename }}
            ./target/release/rpmbuild/RPMS/x86_64/${{ steps.rpm_pkg_filename.outputs.filename }}
            ./target/x86_64-unknown-linux-musl/release/mhost

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: distribution/docker
          push: true
          tags: |
            lukaspustina/mhost:${{ steps.docker_info.outputs.tag }}
            lukaspustina/mhost:latest
          build-args: |
            RELEASE_TAG=${{ steps.docker_info.outputs.tag }}

      - name: Update Homebrew Tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: lukaspustina/homebrew-mhost
          event-type: formula-update
          client-payload: '{"version": "${{ steps.docker_info.outputs.tag }}"}'
